name: Skillarium

on:
  push:
    branches: [main]
    paths:
      - "**/SKILL.md"
      - ".skillarium.yml"
      - ".skillarium/evidence/**"
  pull_request:
    paths:
      - "**/SKILL.md"
      - ".skillarium.yml"
      - ".skillarium/evidence/**"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: skillarium-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build fitness frontier
        run: npx --yes skillarium@latest build --fail-on critical
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .skillarium/site

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
